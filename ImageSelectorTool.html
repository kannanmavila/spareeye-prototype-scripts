<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Selector Tool (Dark Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .selected-image {
            border: 14px solid #16a34a; /* Tailwind's green-600 */
            box-shadow: 0 0 25px rgba(22, 163, 74, 0.7);
            transform: scale(1.05);
            transition: all 0.2s ease-in-out;
        }
        .image-container img {
            transition: transform 0.2s ease-in-out;
        }
        .image-container img:hover {
            transform: scale(1.05);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-300">

    <div class="container mx-auto p-4 md:p-8">
        <header class="bg-gray-800 rounded-lg shadow-lg p-6 mb-8">
            <h1 class="text-3xl font-bold text-white">Image Selector Tool</h1>
            <p class="text-gray-400 mt-2">Upload your TSV file or use the sample data. For each row, click one image to select it. Once all rows have a selection, you can export the updated data.</p>
        </header>

        <!-- Controls Section -->
        <div id="controls" class="bg-gray-800 rounded-lg shadow-lg p-6 mb-8 flex flex-col sm:flex-row items-center gap-4">
            <div class="flex-grow">
                <label for="file-upload" class="block text-sm font-medium text-gray-400 mb-1">Upload TSV File</label>
                <input id="file-upload" type="file" accept=".tsv" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer"/>
            </div>
            <span class="text-gray-500">or</span>
            <button id="load-dummy-btn" class="w-full sm:w-auto bg-gray-700 text-white font-bold py-2 px-6 rounded-lg hover:bg-gray-600 transition duration-300">Use Sample Data</button>
            <button id="copy-btn" class="w-full sm:w-auto bg-indigo-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-indigo-700 transition duration-300 disabled:bg-gray-600 disabled:cursor-not-allowed" disabled>Copy to Clipboard</button>
        </div>

        <!-- Message/Status Area -->
        <div id="message-area" class="mb-4"></div>

        <!-- Data Display Area -->
        <main id="data-container" class="space-y-4">
            <!-- Rows will be dynamically inserted here -->
        </main>

    </div>

    <script>
        // --- DOM Elements ---
        const fileUpload = document.getElementById('file-upload');
        const loadDummyBtn = document.getElementById('load-dummy-btn');
        const copyBtn = document.getElementById('copy-btn');
        const dataContainer = document.getElementById('data-container');
        const messageArea = document.getElementById('message-area');
        
        // --- State ---
        let originalData = [];
        let headers = [];

        // --- Dummy Data ---
        const dummyTsvData = `Product_ID    Category    Subcategory Brand   Product_Name    Price_GBP   Discount_Pct    Availability    Promotion   Size_or_Weight  Description Key_Features    Ingredients Allergens   Nutritional_Info    Tags    Upsell_Suggestions  Cross_Sell_Category Typical_Questions   Image_URL   Aisle_Location  Store_Section   Query   Img1    Img2    Img3
F001    Fresh & Perishable Foods    Fruits  Dole    Bananas £1.99   0   53  500g    Bananas 500g for everyday use.  Quality, Great value, Trusted brand Bananas None    See nutrition info on pack  everyday,fruits,fresh   yogurt,honey,cereal Pairs with Dairy    Are these ripe? https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg   Aisle 1 - Fruits    Fresh   Dole Bananas 500g   https://aswaqrak.ae/pub/media/catalog/product/cache/9e61d75d633e5fc1a695bad0376a2475/1/5/1500937_1.jpg  https://images.openfoodfacts.org/images/products/064/312/604/2365/front_en.5.full.jpg   http://klec.jayagrocer.com/cdn/shop/files/023514-1-1.jpg
F002    Fresh & Perishable Foods    Fruits  Dole    Blueberries £0.49   0   19  4 pack  Blueberries 4 pack for everyday use.    Quality, Great value, Trusted brand Blueberries None    See nutrition info on pack  everyday,fruits,fresh   yogurt,honey,cereal Pairs with Dairy    Are these ripe? https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg   Aisle 1 - Fruits    Fresh   Dole Blueberries 4 pack https://www.dolesunshine.com/wp-content/uploads/sites/14/2024/11/00071202320128_A1N1-2048x2048.png  https://www.dolesunshine.com/wp-content/uploads/sites/14/2024/11/00071202117216_A1N1.png    https://www.foodsafetynews.com/files/2021/06/Dole-Blueberries.png
F004    Fresh & Perishable Foods    Fruits  Dole    Royal Gala Apples   £1.99   0   19  4 pack  Royal Gala Apples 4 pack for everyday use.  Quality, Great value, Trusted brand Royal Gala Apples   None    See nutrition info on pack  everyday,fruits,fresh   yogurt,honey,cereal Pairs with Dairy    Are these ripe? https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg   Aisle 1 - Fruits    Fresh   Dole Royal Gala Apples 4 pack   https://digitalcontent.api.tesco.com/v2/media/ghs/0f18c05a-a058-44bf-95d3-ef0183516bf6/9e56bca0-1085-4654-b2f7-fe46683e4a97_1250408791.jpeg https://banana-king.co.uk/pub/media/catalog/product/cache/b444c4319f4f47455b29cb3c8082684f/r/_/r_gala_banana-king.co.uk.jpeg    https://assets.digitalcontent.marksandspencer.app/image/upload/w_2560,q_auto,c_fill,f_auto/2808566fe9e42325cd8d313625fb4496.jpg
F005    Fresh & Perishable Foods    Fruits  Dole    Bananas £1.25   0   44  4 pack  Bananas 4 pack for everyday use.    Quality, Great value, Trusted brand Bananas None    See nutrition info on pack  everyday,fruits,fresh   yogurt,honey,cereal Pairs with Dairy    Are these ripe? https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg   Aisle 1 - Fruits    Fresh   Dole Bananas 4 pack https://a.fsimg.co.nz/product/retail/fan/image/400x400/5048061.png  https://doleireland.com/uploads/general/_560xAUTO_fit_center-center_75_none/Bananas-doleok.jpg  https://perishablenews.com/wp-content/uploads/2025/05/P_Dole-3.jpg`;

        // --- Functions ---
        
        /**
         * Parses TSV text into an array of objects.
         * @param {string} tsvText - The raw TSV data as a string.
         */
        function parseTSV(tsvText) {
            const rows = tsvText.trim().split('\n');
            headers = rows.shift().trim().split('\t');
            
            originalData = rows.map(row => {
                const values = row.trim().split('\t');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                return obj;
            });

            renderData(originalData);
        }

        /**
         * Renders the parsed data into HTML elements.
         * @param {Array<Object>} data - The array of data objects.
         */
        function renderData(data) {
            dataContainer.innerHTML = ''; // Clear previous data
            if (data.length === 0) {
                showMessage('No data to display.', 'info');
                copyBtn.disabled = true;
                return;
            }

            const requiredColumns = ['Query', 'Img1', 'Img2', 'Img3'];
            const missingColumns = requiredColumns.filter(col => !headers.includes(col));
            if (missingColumns.length > 0) {
                showMessage(`Error: TSV is missing required columns: ${missingColumns.join(', ')}.`, 'error');
                copyBtn.disabled = true;
                return;
            }

            data.forEach((item, index) => {
                const rowElement = document.createElement('div');
                rowElement.className = 'bg-gray-800 rounded-lg shadow-lg p-4 flex flex-col md:flex-row items-center gap-4 fade-in';
                rowElement.setAttribute('data-row-index', index);

                rowElement.innerHTML = `
                    <div class="w-full md:w-1/4 text-center md:text-left">
                        <p class="text-sm text-gray-500">Query:</p>
                        <p class="font-semibold text-lg text-gray-100">${item.Query || 'N/A'}</p>
                    </div>
                    <div class="w-full md:w-3/4 grid grid-cols-1 sm:grid-cols-3 gap-4 image-container">
                        ${[item.Img1, item.Img2, item.Img3].map(imgUrl => `
                            <div class="aspect-square bg-gray-700 rounded-lg flex items-center justify-center overflow-hidden">
                                <img src="${imgUrl}" 
                                     alt="Product Image for ${item.Query}" 
                                     class="object-cover w-full h-full cursor-pointer rounded-lg"
                                     onerror="this.onerror=null;this.src='https://placehold.co/400x400/374151/9ca3af?text=Image+Not+Found';">
                            </div>
                        `).join('')}
                    </div>
                `;
                dataContainer.appendChild(rowElement);
            });
            
            copyBtn.disabled = false;
            showMessage(`Loaded ${data.length} items. Please make a selection for each row.`, 'success');
        }

        /**
         * Handles the selection of an image within a row.
         * @param {Event} e - The click event.
         */
        function handleImageSelection(e) {
            if (e.target.tagName !== 'IMG') return;

            const selectedImage = e.target;
            const rowElement = selectedImage.closest('[data-row-index]');
            if (!rowElement) return;

            // Deselect other images in the same row
            const imagesInRow = rowElement.querySelectorAll('img');
            imagesInRow.forEach(img => img.classList.remove('selected-image'));

            // Select the clicked image
            selectedImage.classList.add('selected-image');

            // Store the selected URL on the row element for later retrieval
            rowElement.setAttribute('data-selected-img', selectedImage.src);
        }

        /**
         * Displays a message to the user.
         * @param {string} text - The message text.
         * @param {'success'|'error'|'info'} type - The type of message.
         */
        function showMessage(text, type = 'info') {
            messageArea.innerHTML = '';
            const messageDiv = document.createElement('div');
            let bgColor, textColor, borderColor;
            switch(type) {
                case 'success':
                    bgColor = 'bg-green-800';
                    textColor = 'text-green-200';
                    borderColor = 'border border-green-700';
                    break;
                case 'error':
                    bgColor = 'bg-red-800';
                    textColor = 'text-red-200';
                    borderColor = 'border border-red-700';
                    break;
                default:
                    bgColor = 'bg-blue-800';
                    textColor = 'text-blue-200';
                    borderColor = 'border border-blue-700';
            }
            messageDiv.className = `p-4 rounded-lg ${bgColor} ${textColor} ${borderColor} text-center font-medium`;
            messageDiv.textContent = text;
            messageArea.appendChild(messageDiv);
        }

        // --- Event Listeners ---
        
        fileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                parseTSV(event.target.result);
            };
            reader.onerror = () => {
                showMessage('Error reading file.', 'error');
            };
            reader.readAsText(file);
        });

        loadDummyBtn.addEventListener('click', () => {
            parseTSV(dummyTsvData);
        });

        dataContainer.addEventListener('click', handleImageSelection);

        copyBtn.addEventListener('click', () => {
            const rows = dataContainer.querySelectorAll('[data-row-index]');
            let allSelected = true;
            const selectedUrls = [];
            
            rows.forEach(row => {
                const selectedImgUrl = row.getAttribute('data-selected-img');
                if (!selectedImgUrl) {
                    allSelected = false;
                    row.classList.add('border-2', 'border-red-500'); // Highlight unselected rows
                } else {
                    row.classList.remove('border-2', 'border-red-500');
                    selectedUrls.push(selectedImgUrl);
                }
            });
            
            if (!allSelected) {
                showMessage('Please select one image for every row before copying. Unselected rows are highlighted in red.', 'error');
                return;
            }

            const tsvContent = "Selected_Img\n" + selectedUrls.join('\n');
            
            // Use the older document.execCommand for broader compatibility in sandboxed environments
            try {
                const textArea = document.createElement("textarea");
                textArea.value = tsvContent;
                textArea.style.position = "fixed";  // Avoid scrolling to bottom
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                const successful = document.execCommand('copy');
                if (successful) {
                    showMessage('Copied to clipboard!', 'success');
                } else {
                    throw new Error('Copy command was not successful');
                }
            } catch (err) {
                showMessage('Failed to copy. Your browser may not support this feature.', 'error');
                console.error('Fallback copy failed: ', err);
            } finally {
                 const textArea = document.querySelector("textarea");
                 if (textArea) {
                    document.body.removeChild(textArea);
                 }
            }
        });

    </script>
</body>
</html>
